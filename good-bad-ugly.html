<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Хороший, плохой, злой</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:linear-gradient(to bottom,#3a2c1a,#1a1208);
  color:#f5e6c4;
}
.container{
  display:flex;
  gap:40px;
  padding:40px;
}
.poster img{
  width:300px;
  border:5px solid #d4af37;
  box-shadow:0 0 20px black;
}
h2,h3{color:#d4af37;}
.info{max-width:700px}
textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#2c1c0e;
  color:white;
  border:1px solid #d4af37;
}
button{
  background:#5a3e1b;
  color:white;
  border:none;
  padding:8px 14px;
  margin-top:8px;
  cursor:pointer;
}
button:hover{background:#8b5a2b}
.comment{
  background:#2c1c0e;
  padding:10px;
  margin-top:10px;
  border-left:3px solid #d4af37;
}
.reply{
  margin-left:30px;
  border-left:3px solid #aaa;
}
.stars span{
  font-size:25px;
  cursor:pointer;
  color:#999;
}
.stars span:hover{color:gold;}
</style>
</head>

<body>

<div class="container">

<div class="poster">
<img src="https://kinogo.online/uploads/mini/shortstory-mob/ed1/1614517323-1826304193.jpg">
<h2>Хороший, плохой, злой</h2>
</div>

<div class="info">

<p><b>Просмотры:</b> <span id="views">0</span></p>

<h3>Оцените фильм</h3>
<div class="stars">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>
Средний рейтинг: <span id="avgRating">0.0</span>
(<span id="votesCount">0</span> голосов)

<h3>Вход</h3>
<input id="nickname" placeholder="Ваш ник">
<button onclick="login()">Войти</button>
<button onclick="logout()">Выйти</button>
<span id="loginInfo"></span>

<h3>Комментарии</h3>
<div id="comments"></div>
<textarea id="commentInput"></textarea>
<button onclick="addComment()">Отправить</button>

</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

firebase.initializeApp({
 apiKey: "AIzaSyCTr1vgcuSEn_2Ebh2vC3k7sNYzvMoYlBo",
  authDomain: "kino-project-bf21c.firebaseapp.com",
  projectId: "kino-project-bf21c"
});

const db = firebase.firestore();

const movieKey = "good_bad_ugly";
const movieRef = db.collection("movies").doc(movieKey);
const statsRef = movieRef.collection("stats");
const ratingRef = movieRef.collection("stats").doc("rating");

let currentUser = null;

/* ========= LOGIN ========= */

async function login(){
  const nick = document.getElementById("nickname").value.trim();
  if(!nick) return;

  currentUser = nick;
  localStorage.setItem("nickname", nick);
  document.getElementById("loginInfo").innerText = "Вы вошли как " + nick;

  initViews();
  loadRating();
}

function logout(){
  currentUser = null;
  localStorage.removeItem("nickname");
  document.getElementById("loginInfo").innerText = "";
}

/* ========= VIEWS ========= */

function initViews(){
  const ref = statsRef.doc("views");

  ref.onSnapshot(doc=>{
    if(doc.exists){
      document.getElementById("views").innerText = doc.data().count || 0;
    }
  });

  if(!localStorage.getItem("viewed_"+movieKey)){
    ref.set({
      count: firebase.firestore.FieldValue.increment(1)
    }, {merge:true});
    localStorage.setItem("viewed_"+movieKey,"yes");
  }
}

/* ========= RATING ========= */

async function loadRating(){
  const snap = await ratingRef.get();
  if(!snap.exists){
    await ratingRef.set({totalScore:0,totalVotes:0});
  }
  const data = (await ratingRef.get()).data();
  const avg = data.totalVotes ? (data.totalScore/data.totalVotes).toFixed(1) : "0.0";
  document.getElementById("avgRating").innerText = avg;
  document.getElementById("votesCount").innerText = data.totalVotes;
}

document.querySelectorAll(".stars span").forEach(star=>{
  star.onclick = async ()=>{
    if(!currentUser) return alert("Войдите!");
    const voteKey = "rated_"+currentUser;
    if(localStorage.getItem(voteKey)) return alert("Вы уже голосовали!");

    const value = parseInt(star.dataset.value);
    await ratingRef.update({
      totalScore: firebase.firestore.FieldValue.increment(value),
      totalVotes: firebase.firestore.FieldValue.increment(1)
    });

    localStorage.setItem(voteKey,"yes");
    loadRating();
  };
});

/* ========= COMMENTS ========= */

db.collection("comments").where("movie","==",movieKey)
.orderBy("created")
.onSnapshot(snapshot=>{
  const container = document.getElementById("comments");
  container.innerHTML="";
  snapshot.forEach(doc=>{
    const c = doc.data();
    const div = document.createElement("div");
    div.className="comment";
    div.innerHTML = `
      <b>${c.user}</b>
      <p>${c.text}</p>
    `;
    container.appendChild(div);
  });
});

async function addComment(){
  if(!currentUser) return alert("Войдите!");
  const text = document.getElementById("commentInput").value;
  if(!text) return;

  await db.collection("comments").add({
    movie: movieKey,
    user: currentUser,
    text: text,
    created: Date.now()
  });

  document.getElementById("commentInput").value="";
}

/* ========= AUTOLOGIN ========= */

window.onload = ()=>{
  const saved = localStorage.getItem("nickname");
  if(saved){
    currentUser = saved;
    document.getElementById("loginInfo").innerText = "Вы вошли как " + saved;
    initViews();
    loadRating();
  }
};

</script>

</body>
</html>
