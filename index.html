<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#1a1208;
    color:#f5e6c4;
}

.movie-title{
    position:relative;
    color:#ffd700;
    font-size:18px;
    cursor:pointer;
    display:inline-block;
}

.movie-title::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0;
    height:2px;
    background:#ffd700;
    transition:0.4s ease;
}

.movie-title:hover::after{
    width:100%;
}


/* ===== Верхнее меню ===== */
.top-menu{
    background:#2c1c0e;
    padding:15px;
    display:flex;
    gap:30px;
    justify-content:center;
}

.top-menu a{
    color:#ffd700;
    text-decoration:none;
    font-size:18px;
}

.top-menu a:hover{
    text-decoration:underline;
}

/* ===== Основной блок ===== */
.main{
    display:flex;
}

/* ===== Левая панель ===== */
.sidebar{
    width:22%;
    background:#2c1c0e;
    padding:20px;
    overflow-y:auto;
    height:100vh;
}

.sidebar h3{
    color:#d4af37;
}

.sidebar a{
    display:block;
    color:#f5e6c4;
    text-decoration:none;
    margin:4px 0;
}

.sidebar a:hover{
    color:#ffd700;
}

/* ===== Каталог ===== */
.catalog{
    width:78%;
    padding:30px;
}

/* ===== Карточка фильма ===== */
.movie-item{
    display:flex;
    gap:20px;
    margin-bottom:40px;
}

.movie-item img{
    width:220px;
    height:320px;
    object-fit:cover;
    border:4px solid #d4af37;
}

.movie-info{
    width:220px; 
    height:320px;
    overflow:hidden;
}

.meta{
    font-size:13px;
    line-height:1.3em;
    max-height:180px;
    overflow:hidden;
}

.description-text{
    font-size:12px;
    max-height:90px;
    overflow:hidden;
}


/* Ссылка */
.movie-item a{
    text-decoration:none;
    color:inherit;
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<!-- ===== Верх ===== -->
<div class="top-menu">
    <a href="#" onclick="showAll()">Фильмы</a>
    <a href="#">Поиск</a>
    <a href="#" onclick="showNew()">Новинки</a>
    <a href="#">Подборки</a>
</div>

<div class="main">

<!-- ===== Левая панель ===== -->
<div class="sidebar">

<h3>Года</h3>
<div id="years"></div>

<h3>Страны</h3>
<a href="#" onclick="filterCountry('США')">США</a>
<a href="#" onclick="filterCountry('Испания')">Испания</a>
<a href="#" onclick="filterCountry('Великобритания')">Великобритания</a>
<a href="#" onclick="filterCountry('Италия')">Италия</a>
<a href="#" onclick="filterCountry('Германия')">Германия</a>
<a href="#" onclick="filterCountry('Франция')">Франция</a>
<a href="#" onclick="filterCountry('Канада')">Канада</a>
<a href="#" onclick="filterCountry('Мексика')">Мексика</a>

</div>

<!-- ===== Каталог ===== -->
<div class="catalog" id="catalog"></div>

</div>

<script>

/* ===== Автогенерация годов ===== */
const yearContainer = document.getElementById("years");
for(let y=1964;y<=2026;y++){
    yearContainer.innerHTML += 
    `<a href="#" onclick="filterYear(${y})">${y}</a>`;
}

/* ===== База фильмов ===== */
const movies = [

{
title:"Хороший, Плохой, Злой",
file:"good-bad-ugly.html",
year:1966,
country:"Испания",
desc:"История трёх стрелков, охотящихся за золотом во времена гражданской войны.",
img:"https://kinogo.online/uploads/mini/shortstory-mob/ed1/1614517323-1826304193.jpg"
},

{
title:"Бойцовский клуб",
file:"fight_club.html",
year:1999,
country:"США",
desc:"Офисный работник создаёт альтер эго и начинает разрушать систему.",
img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHFS7WEw3dSnvD-pu6GKh0CDhf5g6uXC6vow&s"
},

{
title:"Таксист",
file:"taxi_driver_1976.html",
year:1976,
country:"США",
desc:"Одинокий ветеран становится свидетелем упадка Нью-Йорка.",
img:"https://preview.redd.it/taxi-driver-1976-v0-2vafsern2tnf1.jpg?width=640&crop=smart&auto=webp&s=c0319ef604e7680dd8c420851d775d7fe9d2f549"
},

{
title:"За пригоршню долларов",
file:"per_un_pugno_di_dollari.html",
year:1964,
country:"Италия",
desc:"Таинственный стрелок сталкивает две банды.",
img:"https://ru-images.kinorium.com/movie/1080/54934.jpg?1754296715"
},

{
title:"На несколько долларов больше",
file:"for-a-few-dollars-more.html",
year:1965,
country:"Испания",
desc:"Два охотника за головами преследуют преступника.",
img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCxtEljwymUbifbP48s0ryFIgLy1OYI-j4mQ&s"
},

{
title:"Хулиганы Зеленой улицы",
file:"Green_Street_hooligans.html",
year:2005,
country:"Великобритания",
desc:"История студента среди футбольных фанатов.",
img:"https://static.hdrezka.ac/i/2014/1/28/nec0c4b76dd99cm66u83v.jpg"
},

{
title:"Великий уравнитель",
file:"The_Equalizer.html",
year:2014,
country:"США",
desc:"Маккол превращается в великого уравнителя, предлагая свою помощь всем нуждающимся..",
img:"https://static.hdrezka.ac/i/2021/4/5/c3105cc122987ij39b83l.jpeg"
}    
];

/* ===== Вывод ===== */
function render(list){
const catalog=document.getElementById("catalog");
catalog.innerHTML="";
list.forEach(m=>{
catalog.innerHTML+=`
<div class="movie-item">
<a href="${m.file}">
<img src="${m.img}">
<div class="movie-info">
<p class="movie-title">${m.title}</p>
<div class="meta">
Год: ${m.year}<br>
Страна: ${m.country}
</div>
<div class="description">
${m.desc}
</div>
</div>
</a>
</div>
`;
});
}

render(movies);

/* ===== Фильтры ===== */
function filterYear(y){
render(movies.filter(m=>m.year==y));
}

function filterCountry(c){
render(movies.filter(m=>m.country==c));
}

function showAll(){
render(movies);
}

function showNew(){
render(movies.filter(m=>m.file=="fight_club.html"));
}

</script>

</body>
</html>
