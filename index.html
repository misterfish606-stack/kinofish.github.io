<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#1a1208;
    color:#f5e6c4;
}

/* Верхнее меню */
.top-menu{
    background:#2c1c0e;
    padding:15px;
    display:flex;
    gap:30px;
    justify-content:center;
    font-size:18px;
}

.top-menu a{
    color:#ffd700;
    text-decoration:none;
}

.top-menu a:hover{
    text-decoration:underline;
}

/* Основной контейнер */
.main{
    display:flex;
}

/* Левая панель */
.sidebar{
    width:20%;
    background:#2c1c0e;
    padding:20px;
    font-size:18px;
}

.sidebar h3{
    color:#d4af37;
}

.sidebar a{
    display:block;
    color:#f5e6c4;
    text-decoration:none;
    margin:5px 0;
}

.sidebar a:hover{
    color:#ffd700;
}

/* Каталог */
.catalog{
    width:80%;
    padding:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:30px;
}

/* Карточка фильма */
.movie-card{
    text-align:center;
    cursor:pointer;
}

.movie-card img{
    width:100%;
    border:4px solid #d4af37;
    box-shadow:0 0 15px black;
    transition:0.3s;
}

.movie-card img:hover{
    transform:scale(1.05);
}

.movie-title{
    margin-top:10px;
    font-size:16px;
    color:#ffd700;
}

/* чтобы ссылка не ломала стиль */
.movie-link{
    text-decoration:none;
    color:inherit;
}
</style>
</head>

<body>

<!-- Верхнее меню -->
<div class="top-menu">

</div>

<!-- Левая панель -->

    <a href="#">1994</a>

    <h3>Страны</h3>
    <a href="#">США</a>
    <a href="#">Великобритания</a>
    <a href="#">Италия</a>
</div>

<!-- Каталог фильмов -->
