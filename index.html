<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#1a1208;
    color:#f5e6c4;
}

/* ===== Верхнее меню ===== */
.top-menu{
    background:#2c1c0e;
    padding:15px;
    display:flex;
    gap:30px;
    justify-content:center;
}

.top-menu a{
    color:#ffd700;
    text-decoration:none;
    font-size:18px;
}

.top-menu a:hover{
    text-decoration:underline;
}

/* ===== Основной блок ===== */
.main{
    display:flex;
}

/* ===== Левая панель ===== */
.sidebar{
    width:22%;
    background:#2c1c0e;
    padding:20px;
    overflow-y:auto;
    height:100vh;
}

.sidebar h3{
    color:#d4af37;
}

.sidebar a{
    display:block;
    color:#f5e6c4;
    text-decoration:none;
    margin:4px 0;
}

.sidebar a:hover{
    color:#ffd700;
}

/* ===== Каталог ===== */
.catalog{
    width:78%;
    padding:30px;
}

/* ===== Карточка фильма ===== */
.movie-item{
    display:flex;
    gap:20px;
    margin-bottom:40px;
    border-bottom:1px solid #444;
    padding-bottom:20px;
}

/* Картинка */
.movie-item img{
    width:220px;
    height:320px;
    object-fit:cover;
    border:4px solid #d4af37;
    box-shadow:0 0 15px black;
}

/* Текстовый блок */
.movie-info{
    width:220px; /* равен ширине картинки */
    overflow:hidden;
}

/* Название */
.movie-info p{
    margin:0;
    color:#ffd700;
    text-decoration:underline;
    font-size:18px;
}

/* Метаданные */
.meta{
    font-size:14px;
    margin-top:8px;
    line-height:1.4em;
    max-height:260px;
    overflow:hidden;
}

/* Описание */
.description{
    font-size:13px;
    margin-top:8px;
    max-height:120px;
    overflow:hidden;
}

/* Ссылка */
.movie-item a{
    text-decoration:none;
    color:inherit;
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<!-- ===== Верх ===== -->
<div class="top-menu">
    <a href="#" onclick="showAll()">Фильмы</a>
    <a href="#">Поиск</a>
    <a href="#" onclick="showNew()">Новинки</a>
    <a href="#">Подборки</a>
</div>

<div class="main">

<!-- ===== Левая панель ===== -->
<div class="sidebar">

<h3>Года</h3>
<div id="years"></div>

<h3>Страны</h3>
<a href="#" onclick="filterCountry('США')">США</a>
<a href="#" onclick="filterCountry('Испания')">Испания</a>
<a href="#" onclick="filterCountry('Великобритания')">Великобритания</a>
<a href="#" onclick="filterCountry('Италия')">Италия</a>
<a href="#" onclick="filterCountry('Германия')">Германия</a>
<a href="#" onclick="filterCountry('Франция')">Франция</a>
<a href="#" onclick="filterCountry('Канада')">Канада</a>
<a href="#" onclick="filterCountry('Мексика')">Мексика</a>

</div>

<!-- ===== Каталог ===== -->
<div class="catalog" id="catalog"></div>

</div>

<script>

/* ===== Автогенерация годов ===== */
const yearContainer = document.getElementById("years");
for(let y=1964;y<=2026;y++){
    yearContainer.innerHTML += 
    `<a href="#" onclick="filterYear(${y})">${y}</a>`;
}

/* ===== База фильмов ===== */
const movies = [

{
title:"Хороший, Плохой, Злой",
file:"good-bad-ugly.html",
year:1966,
country:"Испания",
desc:"История трёх стрелков, охотящихся за золотом во времена гражданской войны.",
img:"https://kinogo.online/uploads/mini/shortstory-mob/ed1/1614517323-1826304193.jpg"
},

{
title:"Бойцовский клуб",
file:"fight_club.html",
year:1999,
country:"США",
desc:"Подпольный клуб меняет жизнь офисного клерка.",
img:"https://upload.wikimedia.org/wikipedia/en/f/fc/Fight_Club_poster.jpg"
},

{
title:"Таксист",
file:"taxi_driver_1976.html",
year:1976,
country:"США",
desc:"Одинокий ветеран становится свидетелем упадка Нью-Йорка.",
img:"https://upload.wikimedia.org/wikipedia/en/8/8e/Taxi_Driver_poster.jpg"
},

{
title:"За пригоршню долларов",
file:"per_un_pugno_di_dollari.html",
year:1964,
country:"Италия",
desc:"Таинственный стрелок сталкивает две банды.",
img:"https://upload.wikimedia.org/wikipedia/en/4/45/Per_un_pugno_di_dollari_poster.jpg"
},

{
title:"За несколько долларов больше",
file:"for-a-few-dollars-more.html",
year:1965,
country:"Испания",
desc:"Два охотника за головами преследуют преступника.",
img:"https://upload.wikimedia.org/wikipedia/en/5/5e/For_a_Few_Dollars_More.jpg"
},

{
title:"Хулиганы Зеленой улицы",
file:"Green_Street_hooligans.html",
year:2005,
country:"Великобритания",
desc:"История студента, оказавшегося среди футбольных фанатов.",
img:"https://static.hdrezka.ac/i/2014/1/28/nec0c4b76dd99cm66u83v.jpg"
}

];

/* ===== Вывод ===== */
function render(list){
const catalog=document.getElementById("catalog");
catalog.innerHTML="";
list.forEach(m=>{
catalog.innerHTML+=`
<div class="movie-item">
<a href="${m.file}">
<img src="${m.img}">
<div class="movie-info">
<p>${m.title}</p>
<div class="meta">
Год: ${m.year}<br>
Страна: ${m.country}
</div>
<div class="description">
${m.desc}
</div>
</div>
</a>
</div>
`;
});
}

render(movies);

/* ===== Фильтры ===== */
function filterYear(y){
render(movies.filter(m=>m.year==y));
}

function filterCountry(c){
render(movies.filter(m=>m.country==c));
}

function showAll(){
render(movies);
}

function showNew(){
render(movies.filter(m=>m.file=="fight_club.html"));
}

</script>

</body>
</html>
