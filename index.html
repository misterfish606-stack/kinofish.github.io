<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
  margin:0;
  display:flex;
  font-family:Georgia, serif;
  background:#1a1208;
  color:#f5e6c4;
}

/* ЛЕВАЯ ПАНЕЛЬ */
.sidebar{
  width:250px;
  background:#2c1c0e;
  padding:20px;
  height:100vh;
  border-right:3px solid #d4af37;
}

.sidebar h3{
  color:#d4af37;
}

.sidebar button{
  display:block;
  width:100%;
  margin:6px 0;
  padding:6px;
  background:none;
  border:none;
  color:#ffd700;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  color:white;
}

/* ПРАВАЯ ЧАСТЬ */
.main{
  flex:1;
  padding:30px;
}

.movie-list div{
  padding:8px;
  cursor:pointer;
  border-left:3px solid #d4af37;
  margin-bottom:6px;
}

.movie-list div:hover{
  background:#3a2c1a;
}

.details{
  margin-top:20px;
  background:#2c1c0e;
  padding:20px;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>🎬 Категории</h2>

<h3>Жанры</h3>
<button onclick="filterByGenre('all')">Все</button>
<button onclick="filterByGenre('Вестерн')">Вестерн</button>
<button onclick="filterByGenre('Драма')">Драма</button>
<button onclick="filterByGenre('Криминал')">Криминал</button>
<button onclick="filterByGenre('Триллер')">Триллер</button>

<h3>Годы</h3>
<button onclick="filterByYear(1964)">1964</button>
<button onclick="filterByYear(1966)">1966</button>
<button onclick="filterByYear(1976)">1976</button>
<button onclick="filterByYear(2007)">2007</button>

</div>

<div class="main">

<h2>Список фильмов</h2>
<div class="movie-list" id="movieList"></div>

<div class="details" id="movieDetails">
Выберите фильм слева
</div>

</div>

<script>

const movies = [
{
title:"За пригоршню долларов",
year:1964,
genre:["Вестерн"],
likes:120,
description:"Одинокий стрелок вмешивается в войну двух банд."
},
{
title:"Хороший, плохой, злой",
year:1966,
genre:["Вестерн"],
likes:98,
description:"Три стрелка охотятся за золотом во времена Гражданской войны."
},
{
title:"Taxi Driver",
year:1976,
genre:["Драма","Криминал"],
likes:76,
description:"Таксист-ветеран постепенно сходит с ума в Нью-Йорке."
},
{
title:"Старикам тут не место",
year:2007,
genre:["Триллер","Криминал"],
likes:65,
description:"Обычный человек находит чемодан с деньгами и попадает в смертельную игру."
}
];

function displayMovies(list){
  const container = document.getElementById("movieList");
  container.innerHTML="";
  
  list.forEach(movie=>{
    const div = document.createElement("div");
    div.innerText = movie.title;
    div.onclick = ()=>showDetails(movie);
    container.appendChild(div);
  });
}

function showDetails(movie){
  document.getElementById("movieDetails").innerHTML = `
    <h2>${movie.title}</h2>
    <p><b>Год:</b> ${movie.year}</p>
    <p><b>Жанр:</b> ${movie.genre.join(", ")}</p>
    <p><b>Лайки:</b> ${movie.likes}</p>
    <p>${movie.description}</p>
  `;
}

function filterByGenre(genre){
  if(genre==="all"){
    displayMovies(movies);
  }else{
    displayMovies(movies.filter(m=>m.genre.includes(genre)));
  }
}

function filterByYear(year){
  displayMovies(movies.filter(m=>m.year===year));
}

displayMovies(movies);

</script>

</body>
</html>
