<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#1a1208;
  color:#f5e6c4;
}

/* ===== ВЕРХНЕЕ МЕНЮ ===== */
.topbar{
  background:#2c1c0e;
  padding:15px;
  display:flex;
  gap:20px;
  border-bottom:3px solid #d4af37;
}

.topbar button{
  background:none;
  border:none;
  color:#ffd700;
  cursor:pointer;
  font-size:16px;
}

.topbar button:hover{
  color:white;
}

/* ===== ОСНОВНОЙ КОНТЕНТ ===== */
.main{
  padding:20px;
}

.movie-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,200px);
  gap:20px;
}

.movie-card img{
  width:200px;
  height:300px;
  object-fit:cover;
  border:3px solid #d4af37;
  cursor:pointer;
}

/* ===== СТРАНИЦА ФИЛЬМА ===== */
.movie-page{
  display:flex;
  gap:30px;
}

.movie-page img{
  width:300px;
  height:450px;
  object-fit:cover;
  border:4px solid #d4af37;
}

.movie-info{
  max-width:600px;
}

iframe{
  margin-top:20px;
  width:100%;
  height:315px;
}
</style>
</head>
<body>

<div class="topbar">
<button onclick="showAll()">Фильмы</button>
<button onclick="showSearch()">Поиск</button>
<button onclick="showNew()">Новинки</button>
<button onclick="showCollections()">Подборки</button>
</div>

<div class="main" id="content"></div>

<script>

const movies = [
{
id:"fistful",
title:"За пригоршню долларов",
year:1964,
video:"https://www.youtube.com/embed/TgG4V33bB9U",
poster:"https://m.media-amazon.com/images/I/71C1g9gF9ZL._AC_SY679_.jpg",
description:"Одинокий стрелок играет на конфликте двух банд."
},
{
id:"goodbad",
title:"Хороший, плохой, злой",
year:1966,
video:"https://www.youtube.com/embed/WCN5JJY_wiA",
poster:"https://m.media-amazon.com/images/I/81XnYB1KkDL._AC_SY679_.jpg",
description:"Три стрелка ищут золото во времена войны."
},
{
id:"taxi",
title:"Taxi Driver",
year:1976,
video:"https://www.youtube.com/embed/TgG4V33bB9U",
poster:"https://m.media-amazon.com/images/I/71ZxE3WQpFL._AC_SY679_.jpg",
description:"Таксист постепенно сходит с ума."
},
{
id:"nocountry",
title:"Старикам тут не место",
year:2007,
video:"https://www.youtube.com/embed/38A__WT3-o0",
poster:"https://m.media-amazon.com/images/I/81WCNkLQ6-L._AC_SY679_.jpg",
description:"Человек находит деньги и становится мишенью."
}
];

function showAll(){
  const content = document.getElementById("content");
  content.innerHTML = '<h2>Все фильмы</h2><div class="movie-grid"></div>';
  const grid = document.querySelector(".movie-grid");

  movies.forEach(movie=>{
    const card = document.createElement("div");
    card.className="movie-card";
    card.innerHTML=`<img src="${movie.poster}" onclick="openMovie('${movie.id}')">`;
    grid.appendChild(card);
  });
}

function openMovie(id){
  const movie = movies.find(m=>m.id===id);
  const content = document.getElementById("content");

  content.innerHTML = `
  <button onclick="showAll()">← Назад</button>
  <div class="movie-page">
    <img src="${movie.poster}">
    <div class="movie-info">
      <h2>${movie.title}</h2>
      <p><b>Год:</b> ${movie.year}</p>
      <p>${movie.description}</p>
      <iframe src="${movie.video}" allowfullscreen></iframe>
    </div>
  </div>
  `;
}

/* ===== ПОИСК ===== */
function showSearch(){
  const content = document.getElementById("content");
  content.innerHTML = `
    <h2>Поиск</h2>
    <input type="text" id="searchInput" placeholder="Введите название">
    <div id="searchResults"></div>
  `;

  document.getElementById("searchInput").addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const results = movies.filter(m=>m.title.toLowerCase().includes(value));

    const container = document.getElementById("searchResults");
    container.innerHTML="";

    results.forEach(movie=>{
      container.innerHTML += `
        <div>
          <img src="${movie.poster}" width="120" 
          onclick="openMovie('${movie.id}')">
          ${movie.title}
        </div>
      `;
    });
  });
}

/* ===== ПУСТЫЕ РАЗДЕЛЫ ===== */
function showNew(){
  document.getElementById("content").innerHTML="<h2>Новинки (пока пусто)</h2>";
}

function showCollections(){
  document.getElementById("content").innerHTML="<h2>Подборки (пока пусто)</h2>";
}

showAll();

</script>

</body>
</html>
