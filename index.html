<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#1a1208;
  color:#f5e6c4;
  display:flex;
}

/* ===== ЛЕВОЕ МЕНЮ ===== */
.sidebar{
  width:260px; /* увеличено примерно на 20% */
  background:#2c1c0e;
  padding:20px;
  overflow-y:auto;
  height:100vh;
  border-right:3px solid #d4af37;
}

.sidebar h3{
  color:#ffd700;
  margin-top:20px;
}

.sidebar div{
  cursor:pointer;
  margin:5px 0;
}

.sidebar div:hover{
  color:white;
}

/* ===== ОСНОВНОЙ БЛОК ===== */
.main{
  flex:1;
  padding:20px;
}

/* ===== ВЕРХНЕЕ МЕНЮ ===== */
.topbar{
  margin-bottom:20px;
}

.topbar button{
  margin-right:15px;
  background:none;
  border:none;
  color:#ffd700;
  cursor:pointer;
  font-size:16px;
}

.topbar button:hover{
  color:white;
}

/* ===== СЕТКА ФИЛЬМОВ ===== */
.movie-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,200px);
  gap:20px;
}

.movie-card img{
  width:200px;
  height:300px;
  object-fit:cover;
  border:3px solid #d4af37;
  cursor:pointer;
}

.movie-page{
  display:flex;
  gap:30px;
}

.movie-page img{
  width:300px;
  height:450px;
  object-fit:cover;
  border:4px solid #d4af37;
}

.movie-info{
  max-width:600px;
}

iframe{
  margin-top:20px;
  width:100%;
  height:315px;
}
</style>
</head>
<body>

<!-- ===== ЛЕВАЯ ПАНЕЛЬ ===== -->
<div class="sidebar">
<h3>Категории</h3>

<div onclick="filterGenre('Боевик')">Боевик</div>
<div onclick="filterGenre('Вестерн')">Вестерн</div>
<div onclick="filterGenre('Военный')">Военный</div>
<div onclick="filterGenre('Детектив')">Детектив</div>
<div onclick="filterGenre('Драма')">Драма</div>
<div onclick="filterGenre('Исторический')">Исторический</div>
<div onclick="filterGenre('Комедия')">Комедия</div>
<div onclick="filterGenre('Криминал')">Криминал</div>
<div onclick="filterGenre('Мелодрама')">Мелодрама</div>
<div onclick="filterGenre('Приключения')">Приключения</div>
<div onclick="filterGenre('Семейный')">Семейный</div>
<div onclick="filterGenre('Триллер')">Триллер</div>
<div onclick="filterGenre('Ужасы')">Ужасы</div>
<div onclick="filterGenre('Фантастика')">Фантастика</div>
<div onclick="filterGenre('Фэнтези')">Фэнтези</div>

<h3>Года</h3>
<div onclick="filterYear(1964)">1964</div>
<div onclick="filterYear(1966)">1966</div>
<div onclick="filterYear(1976)">1976</div>
<div onclick="filterYear(2007)">2007</div>

<h3>По странам</h3>
<div onclick="filterCountry('США')">США</div>
<div onclick="filterCountry('Италия')">Италия</div>
<div onclick="filterCountry('Испания')">Испания</div>
</div>

<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<div class="main">

<div class="topbar">
<button onclick="showAll()">Фильмы</button>
<button onclick="showSearch()">Поиск</button>
<button>Новинки</button>
<button>Подборки</button>
</div>

<div id="content"></div>

</div>

<script>

/* ===== БАЗА ФИЛЬМОВ ===== */

const movies = [
{
id:"fistful",
title:"За пригоршню долларов",
year:1964,
genre:"Вестерн",
country:"Италия",
poster:"https://m.media-amazon.com/images/I/71C1g9gF9ZL._AC_SY679_.jpg",
video:"https://www.youtube.com/embed/TgG4V33bB9U",
description:"Одинокий стрелок играет на конфликте двух банд."
},
{
id:"goodbad",
title:"Хороший, плохой, злой",
year:1966,
genre:"Вестерн",
country:"Италия",
poster:"https://m.media-amazon.com/images/I/81XnYB1KkDL._AC_SY679_.jpg",
video:"https://www.youtube.com/embed/WCN5JJY_wiA",
description:"Три стрелка ищут золото."
},
{
id:"taxi",
title:"Taxi Driver",
year:1976,
genre:"Драма",
country:"США",
poster:"https://m.media-amazon.com/images/I/71ZxE3WQpFL._AC_SY679_.jpg",
video:"https://www.youtube.com/embed/TgG4V33bB9U",
description:"Таксист постепенно сходит с ума."
},
{
id:"nocountry",
title:"Старикам тут не место",
year:2007,
genre:"Триллер",
country:"США",
poster:"https://m.media-amazon.com/images/I/81WCNkLQ6-L._AC_SY679_.jpg",
video:"https://www.youtube.com/embed/38A__WT3-o0",
description:"Человек находит деньги и становится мишенью."
}
];

/* ===== ПОКАЗ ВСЕХ ===== */
function showAll(){
  const content = document.getElementById("content");
  content.innerHTML='<div class="movie-grid"></div>';
  const grid=document.querySelector(".movie-grid");

  movies.forEach(m=>{
    grid.innerHTML+=`
      <div class="movie-card">
        <img src="${m.poster}" onclick="openMovie('${m.id}')">
      </div>
    `;
  });
}

/* ===== ОТКРЫТИЕ ФИЛЬМА КАК СТРАНИЦЫ ===== */
function openMovie(id){
  window.location.search="?movie="+id;
}

/* ===== ЗАГРУЗКА ПО URL ===== */
function loadMovieFromURL(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get("movie");
  if(!id){ showAll(); return; }

  const m=movies.find(x=>x.id===id);
  if(!m) return;

  document.getElementById("content").innerHTML=`
  <button onclick="window.location='index.html'">← Назад</button>
  <div class="movie-page">
    <img src="${m.poster}">
    <div class="movie-info">
      <h2>${m.title}</h2>
      <p><b>Год:</b> ${m.year}</p>
      <p><b>Жанр:</b> ${m.genre}</p>
      <p><b>Страна:</b> ${m.country}</p>
      <p>${m.description}</p>
      <iframe src="${m.video}" allowfullscreen></iframe>
    </div>
  </div>
  `;
}

/* ===== ФИЛЬТРЫ ===== */
function filterGenre(g){
  const filtered=movies.filter(m=>m.genre===g);
  showFiltered(filtered);
}
function filterYear(y){
  const filtered=movies.filter(m=>m.year===y);
  showFiltered(filtered);
}
function filterCountry(c){
  const filtered=movies.filter(m=>m.country===c);
  showFiltered(filtered);
}

function showFiltered(list){
  const content=document.getElementById("content");
  content.innerHTML='<div class="movie-grid"></div>';
  const grid=document.querySelector(".movie-grid");
  list.forEach(m=>{
    grid.innerHTML+=`<div class="movie-card">
    <img src="${m.poster}" onclick="openMovie('${m.id}')">
    </div>`;
  });
}

/* ===== ПОИСК ===== */
function showSearch(){
  const content=document.getElementById("content");
  content.innerHTML=`
  <input type="text" id="searchInput" placeholder="Введите название">
  <div id="searchResults"></div>
  `;

  document.getElementById("searchInput").addEventListener("input",function(){
    const value=this.value.toLowerCase();
    const results=movies.filter(m=>m.title.toLowerCase().includes(value));

    const box=document.getElementById("searchResults");
    box.innerHTML="";
    results.forEach(m=>{
      box.innerHTML+=`
      <div>
        <img src="${m.poster}" width="120"
        onclick="openMovie('${m.id}')">
        ${m.title}
      </div>
      `;
    });
  });
}

loadMovieFromURL();

</script>

</body>
</html>
